# DigitalOcean App Platform spec for StockSentry.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Deploy options:
#   A) Dashboard (easiest): cloud.digitalocean.com/apps → Create App → connect your
#      GitHub repo → it auto-detects this Dockerfile → set the env vars below → Deploy.
#   B) CLI:  doctl apps create --spec .do/app.yaml   (then set the SECRET values)
#
# Prerequisites:
#   • DigitalOcean account (billing enabled).
#   • This repo pushed to GitHub/GitLab (App Platform builds from a connected repo).
#   • Your BALLAST "API secret key" from the Partner Dashboard.

name: stocksentry
region: nyc

services:
  - name: web
    # Build straight from the repo Dockerfile.
    dockerfile_path: Dockerfile
    source_dir: /
    github:
      repo: YOUR_GITHUB_USER/YOUR_REPO   # <-- change to your repo
      branch: main
      deploy_on_push: true
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb  # change in the dashboard if needed
    health_check:
      http_path: /
      initial_delay_seconds: 40
    envs:
      # --- Non-secret config (safe to commit) ---
      - key: SHOPIFY_API_KEY
        scope: RUN_AND_BUILD_TIME
        value: f0a72a979bef4b87678eb17a96847bcd
      - key: SCOPES
        scope: RUN_AND_BUILD_TIME
        value: read_products,write_products,read_inventory,write_inventory,read_orders,read_merchant_managed_fulfillment_orders,read_locations
      # Set this to your app's public URL after the first deploy assigns it,
      # e.g. https://stocksentry-xxxxx.ondigitalocean.app  (then redeploy).
      - key: SHOPIFY_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: https://REPLACE-with-your-app.ondigitalocean.app
      # --- Secrets: set the real values in the dashboard (encrypted) or via doctl ---
      - key: SHOPIFY_API_SECRET
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: REPLACE_IN_DASHBOARD
