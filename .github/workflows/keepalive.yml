name: Keep Render awake

# Render's free tier spins the service down after ~15 minutes of inactivity,
# which causes a ~50s cold start (and a blank embedded screen during that
# window). This workflow pings the app on a schedule so it stays warm.
#
# Note: GitHub's scheduled runs can be delayed under load, so this is
# best-effort. For guaranteed uptime, upgrade Render to a paid tier or use an
# external uptime monitor (UptimeRobot / cron-job.org) hitting the same URL.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app (twice, 5 min apart, to widen coverage)
        run: |
          ping() { curl -fsS --max-time 90 https://stocksentry-v16f.onrender.com/ > /dev/null && echo "ping OK $(date -u)" || echo "ping failed $(date -u) (will retry next run)"; }
          ping
          sleep 300
          ping
