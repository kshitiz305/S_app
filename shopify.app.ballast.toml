# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f0a72a979bef4b87678eb17a96847bcd"
name = "BALLAST"
application_url = "https://stocksentry-v16f.onrender.com"
embedded = true

[access_scopes]
# StockSentry scopes (DEVELOPMENT_SPEC §7 Phase 0.2 + read_locations for inventory writes)
scopes = "read_products,write_products,read_inventory,write_inventory,read_orders,read_merchant_managed_fulfillment_orders,read_locations"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://stocksentry-v16f.onrender.com/auth/callback",
  "https://stocksentry-v16f.onrender.com/auth/shopify/callback",
  "https://stocksentry-v16f.onrender.com/api/auth/callback"
]

[webhooks]
api_version = "2026-04"

  # ──────────────────────────────────────────────────────────────────────────
  # The order/refund/fulfillment webhooks below carry PROTECTED CUSTOMER DATA.
  # Shopify blocks subscribing to them until this app has "Protected customer
  # data access" approved in the Partner Dashboard
  #   (Apps → BALLAST → API access → Protected customer data access).
  # fulfillments/create ALSO needs the read_fulfillments scope.
  # After enabling access, uncomment these four blocks (and add read_fulfillments
  # to access_scopes) and run `npm run deploy` again.
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/create" ]
  #   uri = "/webhooks/orders/create"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "refunds/create" ]
  #   uri = "/webhooks/refunds/create"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/cancelled" ]
  #   uri = "/webhooks/orders/cancelled"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "fulfillments/create" ]
  #   uri = "/webhooks/fulfillments/create"
  # ──────────────────────────────────────────────────────────────────────────

  # Manual-edit detection — inventory data, NOT protected customer data, so this
  # is safe to subscribe immediately. Drives each pool's reconcileMode policy.
  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[pos]
embedded = false

[build]
# Keep the production URL fixed; do not let `shopify app dev` overwrite it.
# To develop locally again, temporarily set this back to true (or use a separate
# dev config) so the dev tunnel URL is used.
automatically_update_urls_on_dev = false
