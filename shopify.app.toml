# BALLAST — LOCAL DEV config (same app as shopify.app.ballast.toml).
# Use this for local development: `shopify app dev` updates the URLs below to your
# tunnel automatically (automatically_update_urls_on_dev = true). For a custom
# Cloudflare tunnel: `shopify app dev --config shopify.app.toml --tunnel-url=https://<host>:3000`.
# Switch to production (Render) with: `shopify app config use ballast`.

client_id = "f0a72a979bef4b87678eb17a96847bcd"
name = "BALLAST"
application_url = "https://localhost"
embedded = true

[access_scopes]
# Scopes per DEVELOPMENT_SPEC §7 Phase 0.2 (+ read_locations for inventory writes)
scopes = "read_products,write_products,read_inventory,write_inventory,read_orders,read_merchant_managed_fulfillment_orders,read_locations"

[auth]
redirect_urls = [
  "https://localhost/auth/callback",
  "https://localhost/auth/shopify/callback",
  "https://localhost/api/auth/callback"
]

[webhooks]
api_version = "2026-04"

  # Inventory-impacting events (Phase 3) — PROTECTED customer data. Keep these
  # COMMENTED until "Protected customer data access" is approved for the app,
  # otherwise `shopify app dev`/`deploy` fails to register them.
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/create" ]
  #   uri = "/webhooks/orders/create"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "refunds/create" ]
  #   uri = "/webhooks/refunds/create"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "orders/cancelled" ]
  #   uri = "/webhooks/orders/cancelled"
  #
  #   [[webhooks.subscriptions]]
  #   topics = [ "fulfillments/create" ]
  #   uri = "/webhooks/fulfillments/create"

  # Manual-edit detection (respect merchant edits) — not protected customer data.
  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  # Lifecycle (Phase 8)
  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  # Mandatory GDPR / compliance webhooks (Phase 8)
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  uri = "/webhooks/compliance"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true
